# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":8080"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  serverRoot:  "./web"

# https://goframe.org/docs/core/glog-config
logger:
  level : "all"
  stdout: true

# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    link: "mysql:${MYSQL_USER:aiferry}:${MYSQL_PASSWORD:aiferry}@tcp(${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306})/${MYSQL_DATABASE:aiferry}?charset=utf8mb4&parseTime=true&loc=Local"
    debug: false
    createdAt: created_at
    updatedAt: updated_at
    deletedAt: deleted_at

redis:
  default:
    address: "${REDIS_ADDR:127.0.0.1:6379}"
    pass: "${REDIS_PASSWORD:}"
    db: ${REDIS_DB:0}

aiferry:
  webRoot: "${WEB_ROOT:./web}"
  masterKey: "${AIFERRY_MASTER_KEY:}"
  maxFailoverAttempts: 3
  channelFailureThreshold: 3
  channelCooldownSeconds: 60
