services:
  mysql:
    image: mysql:8.4
    profiles: ["local"]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aiferry}
      MYSQL_USER: ${MYSQL_USER:-aiferry}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aiferry}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aiferry-root}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    profiles: ["local"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 3s
      retries: 20

  aiferry:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aiferry}
      MYSQL_USER: ${MYSQL_USER:-aiferry}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aiferry}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AIFERRY_MASTER_KEY: ${AIFERRY_MASTER_KEY:-}
      WEB_ROOT: /app/web
    ports:
      - "${AIFERRY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  mysql-data:
  redis-data:
