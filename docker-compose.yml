services:
  aiferry:
    image: ghcr.io/ayflying/aiferry:latest
    env_file:
      - .env
    environment:
      WEB_ROOT: /app/web
    ports:
      - "38517:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
